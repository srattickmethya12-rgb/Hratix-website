<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New enquiry — HRATIX website</title>
</head>
<body style="margin:0; padding:0; background-color:#07060a; font-family: Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#07060a; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px; background-color:#131019; border:1px solid rgba(245,244,247,0.09); border-radius:20px; overflow:hidden;">

          <tr>
            <td style="padding:32px 40px 0; text-align:center;">
              <div style="font-family: Arial, Helvetica, sans-serif; font-size:22px; font-weight:bold; letter-spacing:1px;">
                <span style="color:#f5f4f7;">HRA</span><span style="color:#c04fd8;">TIX</span>
              </div>
              <div style="font-family: 'Courier New', monospace; font-size:10.5px; letter-spacing:2px; color:#b186e0; margin-top:6px;">
                NEW WEBSITE ENQUIRY
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:24px 40px 0;">
              <div style="height:3px; width:48px; margin:0 auto; background:linear-gradient(90deg,#9d5cff,#d946c0); border-radius:2px;"></div>
            </td>
          </tr>

          <tr>
            <td style="padding:26px 40px 8px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="font-size:14px; color:#f5f4f7;">
                <tr>
                  <td style="padding:10px 0; border-bottom:1px solid rgba(245,244,247,0.09); color:#a39bb5; width:90px;">Name</td>
                  <td style="padding:10px 0; border-bottom:1px solid rgba(245,244,247,0.09);">{{ name }}</td>
                </tr>
                <tr>
                  <td style="padding:10px 0; border-bottom:1px solid rgba(245,244,247,0.09); color:#a39bb5;">Email</td>
                  <td style="padding:10px 0; border-bottom:1px solid rgba(245,244,247,0.09);">
                    <a href="mailto:{{ email }}" style="color:#c98cff; text-decoration:none;">{{ email }}</a>
                  </td>
                </tr>
                <tr>
                  <td style="padding:10px 0; border-bottom:1px solid rgba(245,244,247,0.09); color:#a39bb5;">Phone</td>
                  <td style="padding:10px 0; border-bottom:1px solid rgba(245,244,247,0.09);">{{ phone }}</td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:8px 40px 30px;">
              <p style="margin:0 0 8px; font-size:12px; letter-spacing:1px; color:#a39bb5; text-transform:uppercase;">Message</p>
              <p style="margin:0; font-size:14.5px; line-height:1.6; color:#f5f4f7; white-space:pre-wrap;">{{ message }}</p>
            </td>
          </tr>

          <tr>
            <td style="padding:0 40px 36px; text-align:center;">
              <a href="mailto:{{ email }}" style="display:inline-block; padding:12px 26px; background:linear-gradient(90deg,#9d5cff,#b954e8,#d946c0); color:#ffffff; text-decoration:none; font-size:13.5px; font-weight:600; border-radius:999px;">
                Reply to {{ name }}
              </a>
            </td>
          </tr>

          <tr>
            <td style="padding:18px 40px 28px; border-top:1px solid rgba(245,244,247,0.09); text-align:center;">
              <p style="margin:0; font-size:11.5px; color:#6f6680;">
                Sent automatically by the HRATIX website contact form.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
